# 数据存储目录：所有数据存放在 ./cdb 文件夹下
# 启动前请先创建数据目录：
#   mkdir -p cdb/mysql/data cdb/mysql/conf cdb/redis/data cdb/milvus/etcd cdb/milvus/minio cdb/milvus/milvus

services:
  # MySQL 8.4 LTS - 生产级稳定版
  mysql:
    image: mysql:8.4
    container_name: tts-mysql
    restart: always
    environment:
      # ⚠️ 生产环境请修改密码
      MYSQL_ROOT_PASSWORD: xiukun007
      MYSQL_DATABASE: tts_service_db
    ports:
      - "3306:3306"
    volumes:
      - ./cdb/mysql/data:/var/lib/mysql
      - ./cdb/mysql/conf:/etc/mysql/conf.d

  # Redis - 高性能缓存
  redis:
    image: redis:7.2-alpine
    container_name: tts-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./cdb/redis/data:/data
    command: redis-server --appendonly yes

  # ==================== Milvus 向量数据库 ====================
  # etcd - Milvus 元数据存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: tts-etcd
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./cdb/milvus/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO - Milvus 对象存储
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: tts-minio
    restart: always
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./cdb/milvus/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus Standalone - 向量搜索引擎
  milvus:
    image: milvusdb/milvus:v2.6.13
    container_name: tts-milvus
    restart: always
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"  # Milvus gRPC
      - "9091:9091"    # Metrics
    volumes:
      - ./cdb/milvus/milvus:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3